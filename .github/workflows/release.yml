name: Package and release to CurseForge

# Runs when a version tag is pushed (e.g. v0.8.0). Your existing publish
# pipeline already creates the tag + GitHub Release; this workflow only
# adds the CurseForge upload on top of it.
on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  curseforge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and upload to CurseForge
        uses: BigWigsMods/packager@v2
        env:
          # ONLY CurseForge. No GITHUB_OAUTH on purpose, so the packager does
          # not create or touch the GitHub Release your own pipeline builds.
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
